<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stampa Canti | Messale</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/stampa-canti.css">
</head>

<body>
    <div class="toolbar no-print">
        <div class="toolbar-brand">
            <i class="fa-solid fa-book-open"></i>
            <span class="brand-title">Canti liturgici</span>
            <span class="brand-sub">5+1 foglietti</span>
        </div>
        <div class="toggle-group">
            <span>Altezza</span>
            <div class="toggle-switch" id="toggle-altezza" onclick="toggleAltezza(this)"></div>
        </div>
        <div class="toggle-group">
            <span>Data</span>
            <div class="toggle-switch on" id="toggle-data" onclick="toggleData(this)"></div>
        </div>
        <div class="toggle-group">
            <span>Indicazioni</span>
            <div class="toggle-switch on" id="toggle-indicazioni" onclick="toggleIndicazioni(this)"></div>
        </div>
        <div class="font-selector">
            <label>Font:</label>
            <button class="font-btn attivo" data-font="garamond"
                onclick="cambiaFont('garamond', this)">Garamond</button>
            <button class="font-btn" data-font="lato" onclick="cambiaFont('lato', this)">Lato</button>
            <button class="font-btn" data-font="sourceserif" onclick="cambiaFont('sourceserif', this)">Source
                Serif</button>
        </div>
        <button onclick="window.print()" class="btn-stampa">
            <i class="fa-solid fa-print" style="color: #fafafa;"></i>&emsp;Stampa
        </button>
    </div>

    <div class="content-wrap">
        <div id="editor-container" class="no-print"></div>
        <div id="pagina"></div>
    </div>
</body>

<script>
    const sheetId = "1NYcf3upDR8YLuPX0dm__T1ArAZLXBIdNRBgzwC5GCa0";
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    let listaCanti = [];
    let dataFoglietto = "";
    let mostraData = true;
    let mostraIndicazioni = true;
    let mostraAltezza = false;

    function formattaData(data) {
        const opzioni = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        return new Intl.DateTimeFormat('it-IT', opzioni).format(data);
    }

    async function caricaCanti() {
        try {
            const response = await fetch(sheetUrl);
            const text = await response.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            const rows = json.table.rows;

            // Leggi la data dalla prima riga, colonna C (indice 2)
            const dataCell = rows[0]?.c?.[2];
            if (dataCell?.v) {
                const d = new Date(dataCell.v);
                dataFoglietto = formattaData(d);
            }

            listaCanti = [];

            rows.slice(1).forEach(row => {
                if (!row.c || row.c.length < 3) return;

                const titolo = row.c[0]?.v?.trim();
                const indicazione = row.c[2]?.v?.trim();

                if (!titolo || !indicazione) return;
                if (indicazione.toLowerCase().includes("salmo")) return;

                listaCanti.push({ titolo, indicazione });
            });

            mostraEditor();
            generaFoglietti();

        } catch (err) {
            console.error("Errore caricamento canti:", err);
            const container = document.getElementById("editor-container");
            if (container) {
                container.innerHTML = `<div class="notification is-light is-danger" style="font-size:0.9rem;"><i class="fas fa-exclamation-triangle"></i> Impossibile caricare i canti. Verifica connessione o foglio Google.</div>`;
            }
        }
    }

    function mostraEditor() {
        const container = document.getElementById("editor-container");
        if (!container) return;
        container.innerHTML = "";

        const editorDiv = document.createElement("div");
        editorDiv.className = "editor-container";
        editorDiv.id = "editor-canti";

        const titleDiv = document.createElement("div");
        titleDiv.className = "editor-title";
        titleDiv.innerHTML = `<i class="fas fa-hashtag"></i> Assegna numeri ai canti <span style="font-size:0.7rem; font-weight:normal;">(primo numero per i primi 5 foglietti, secondo per il sesto)</span>`;
        editorDiv.appendChild(titleDiv);

        const scrollDiv = document.createElement("div");
        scrollDiv.className = "editor-scroll";

        listaCanti.forEach((canto, idx) => {
            const riga = document.createElement("div");
            riga.className = "editor-riga";

            const inputGroup = document.createElement("div");
            inputGroup.className = "input-group";

            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Num. coro";
            input.className = "numero-input";
            input.setAttribute("data-index", idx);

            const spanSep = document.createElement("span");
            spanSep.textContent = "•";

            const input2 = document.createElement("input");
            input2.type = "text";
            input2.placeholder = "Num. assemblea";
            input2.className = "numero-input2";
            input2.setAttribute("data-index2", idx);

            inputGroup.appendChild(input);
            inputGroup.appendChild(spanSep);
            inputGroup.appendChild(input2);

            const spanCanto = document.createElement("span");
            spanCanto.className = "canto-label";
            spanCanto.innerText = canto.titolo;

            riga.appendChild(inputGroup);
            riga.appendChild(spanCanto);
            scrollDiv.appendChild(riga);
        });

        editorDiv.appendChild(scrollDiv);
        container.appendChild(editorDiv);

        caricaNumeriSalvati();

        document.querySelectorAll(".numero-input, .numero-input2").forEach(input => {
            input.addEventListener("input", () => {
                generaFoglietti();
                salvaNumeri();
            });
        });
    }

    function salvaNumeri() {
        const numeri1 = {};
        const numeri2 = {};

        document.querySelectorAll(".numero-input").forEach(input => {
            const index = input.getAttribute("data-index");
            const valore = input.value.trim();
            if (valore) numeri1[index] = valore;
        });

        document.querySelectorAll(".numero-input2").forEach(input => {
            const index = input.getAttribute("data-index2");
            const valore = input.value.trim();
            if (valore) numeri2[index] = valore;
        });

        localStorage.setItem("numeriCanti1", JSON.stringify(numeri1));
        localStorage.setItem("numeriCanti2", JSON.stringify(numeri2));
        localStorage.setItem("numeriCanti_timestamp", Date.now());
    }

    function caricaNumeriSalvati() {
        const scadenza = 24 * 60 * 60 * 1000;
        const timestamp = localStorage.getItem("numeriCanti_timestamp");
        const ora = Date.now();

        if (timestamp && (ora - parseInt(timestamp)) < scadenza) {
            const numeri1Salvati = localStorage.getItem("numeriCanti1");
            if (numeri1Salvati) {
                const numeri1 = JSON.parse(numeri1Salvati);
                Object.keys(numeri1).forEach(index => {
                    const input = document.querySelector(`.numero-input[data-index="${index}"]`);
                    if (input) input.value = numeri1[index];
                });
            }

            const numeri2Salvati = localStorage.getItem("numeriCanti2");
            if (numeri2Salvati) {
                const numeri2 = JSON.parse(numeri2Salvati);
                Object.keys(numeri2).forEach(index => {
                    const input = document.querySelector(`.numero-input2[data-index2="${index}"]`);
                    if (input) input.value = numeri2[index];
                });
            }
            return true;
        }
        return false;
    }

    const abbreviazioni = {
        "ingresso": "Ingr",
        "aspersione": "Asp",
        "atto penitenziale": "Kyrie",
        "gloria": "Gloria",
        "acclamazione al vangelo": "Vangelo",
        "offertorio": "Off",
        "santo": "Santo",
        "agnello di dio": "Agn. di Dio",
        "comunione": "Com",
        "congedo": "Fine",
        "canto da ripassare": "Ripasso"
    };

    function abbrevia(indicazione) {
        const key = indicazione.toLowerCase().trim();
        return abbreviazioni[key] || indicazione;
    }

    function abbreviaTitolo(titolo) {
        const agnello = titolo.match(/^Agnello di Dio\s*\(([^)]+)\)/i);
        if (agnello) return agnello[1].trim();
        const alleluia = titolo.match(/^Alleluia[,\s]+(.+)/i);
        if (alleluia) return `All. ${alleluia[1].trim()}`;
        return titolo;
    }

    function generaListaHTMLPrimari() {
        let html = "";
        listaCanti.forEach((canto, i) => {
            const inputEl = document.querySelector(`.numero-input[data-index="${i}"]`);
            const numero = inputEl ? inputEl.value.trim() : "";
            const titoloSafe = escapeHtml(abbreviaTitolo(canto.titolo));
            const numeroSafe = escapeHtml(numero);
            const indicazione = canto.indicazione.replace(/\s*\(\d+\)\s*$/, "").trim();
            const indicazioneSafe = escapeHtml(abbrevia(indicazione));
            html += `<p>
                ${(mostraIndicazioni && indicazioneSafe) ? `<span class="canto-indicazione">${indicazioneSafe}:</span> ` : ""}
                <span class="canto-titolo">${titoloSafe}</span>
                ${numeroSafe ? `<span class="canto-numero">${numeroSafe}</span>` : ""}
            </p>`;
        });
        return html;
    }

    function generaListaHTMLSecondari() {
        let html = "";
        listaCanti.forEach((canto, i) => {
            const input2El = document.querySelector(`.numero-input2[data-index2="${i}"]`);
            const numero2 = input2El?.value.trim() || "";
            if (!numero2) return;
            const titoloSafe = escapeHtml(abbreviaTitolo(canto.titolo));
            const indicazioneSafe = escapeHtml(canto.indicazione.replace(/\s*\(\d+\)\s*$/, "").trim());
            const numero2Safe = escapeHtml(numero2);
            html += `<p>
                ${(mostraIndicazioni && indicazioneSafe) ? `<span class="canto-indicazione">${indicazioneSafe}:</span> ` : ""}
                <span class="canto-titolo">${titoloSafe}</span>
                <span class="canto-numero2">${numero2Safe}</span>
            </p>`;
        });

        if (html === "") {
            html = `<p style="font-style: italic; color: #999; justify-content: center;">— Nessun canto con numero secondario —</p>`;
        }
        return html;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function generaFoglietti() {
        const pagina = document.getElementById("pagina");
        if (!pagina) return;

        const listaPrimari = generaListaHTMLPrimari();
        const listaSecondari = generaListaHTMLSecondari();

        pagina.innerHTML = "";

        const dataHtml = (mostraData && dataFoglietto)
            ? `<div class="foglietto-data">${escapeHtml(dataFoglietto)}</div>`
            : "";

        for (let i = 0; i < 5; i++) {
            const foglietto = document.createElement("div");
            foglietto.className = "foglietto";
            foglietto.innerHTML = `${dataHtml}<div class="canti">${listaPrimari}</div>`;
            pagina.appendChild(foglietto);
        }

        const sestoFoglietto = document.createElement("div");
        sestoFoglietto.className = "foglietto";
        sestoFoglietto.innerHTML = `${dataHtml}<div class="canti">${listaSecondari}</div>`;
        pagina.appendChild(sestoFoglietto);

        // Barra altezza sotto tutti i foglietti
        if (mostraAltezza) {
            requestAnimationFrame(() => {
                const limite = 9.6 * 37.795;
                const foglietti = document.querySelectorAll(".foglietto");
                const altezze = Array.from(foglietti).map(f => f.getBoundingClientRect().height);
                const maxH = Math.max(...altezze);
                const maxHCm = (maxH / 37.795).toFixed(2);
                const sforato = maxH > limite;

                let barra = document.getElementById("barra-altezza");
                if (!barra) {
                    barra = document.createElement("div");
                    barra.id = "barra-altezza";
                    pagina.parentNode.insertBefore(barra, pagina.nextSibling);
                }
                barra.className = "barra-altezza no-print" + (sforato ? " sforato" : "");
                barra.innerHTML = `<i class="fas fa-ruler-vertical"></i> Altezza foglietto: <strong>${maxHCm} cm</strong> ${sforato ? `<span class="avviso-sforato">⚠ supera 9.6 cm</span>` : `<span class="ok">✓ nei limiti</span>`}`;
            });
        } else {
            const barra = document.getElementById("barra-altezza");
            if (barra) barra.remove();
        }
    }

    const fontMap = {
        garamond: { canti: "'EB Garamond', Georgia, serif", numeri: "'EB Garamond', Georgia, serif" },
        lato: { canti: "'Lato', system-ui, sans-serif", numeri: "'Lato', system-ui, sans-serif" },
        sourceserif: { canti: "'Source Serif 4', Georgia, serif", numeri: "'Source Serif 4', Georgia, serif" }
    };

    function cambiaFont(nome, btn) {
        const f = fontMap[nome];
        if (!f) return;
        document.documentElement.style.setProperty('--font-canti', f.canti);
        document.documentElement.style.setProperty('--font-numeri', f.numeri);
        document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('attivo'));
        btn.classList.add('attivo');
        localStorage.setItem('fontCanti', nome);
    }

    function ripristinaFont() {
        const saved = localStorage.getItem('fontCanti');
        if (saved) {
            const btn = document.querySelector(`.font-btn[data-font="${saved}"]`);
            if (btn) cambiaFont(saved, btn);
        }
    }

    function toggleAltezza(el) {
        mostraAltezza = !mostraAltezza;
        el.classList.toggle("on", mostraAltezza);
        generaFoglietti();
    }

    function toggleData(el) {
        mostraData = !mostraData;
        el.classList.toggle("on", mostraData);
        generaFoglietti();
    }

    function toggleIndicazioni(el) {
        mostraIndicazioni = !mostraIndicazioni;
        el.classList.toggle("on", mostraIndicazioni);
        generaFoglietti();
    }

    caricaCanti();
    ripristinaFont();
</script>

</html>
